name: Build and Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Emscripten
      if: ${{ !env.ACT }}
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: '3.1.56'

    - name: Build native stub
      if: ${{ !env.ACT }}
      run: bash src/Base/SqliteWasmBlazor/native/build_stub.sh

    - name: Verify native stub was built
      if: ${{ !env.ACT }}
      run: |
        ls -lh src/Base/SqliteWasmBlazor/native/lib/e_sqlite3.a
        file src/Base/SqliteWasmBlazor/native/lib/e_sqlite3.a

    - name: Install npm dependencies (TypeScript-Common)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Common

    - name: Install npm dependencies (TypeScript-Crypto)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript-Crypto

    - name: Install npm dependencies (SqliteWasmBlazor worker)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor/TypeScript

    - name: Install npm dependencies (Components)
      run: npm install
      working-directory: src/Base/SqliteWasmBlazor.Components/TypeScript

    - name: Install npm dependencies (Crypto worker)
      run: npm install
      working-directory: src/Crypto/SqliteWasmBlazor.Crypto/TypeScript

    # Build each csproj individually in dependency order. We deliberately
    # avoid `dotnet restore SqliteWasmBlazor.slnx` followed by `dotnet build
    # --no-restore`: the solution-wide restore evaluates BOTH branches of the
    # Demo's `<ItemGroup Condition="'$(Configuration)' == 'Debug'">` block
    # (where the in-repo ProjectReferences live for inner-loop iteration)
    # AND its Release-only `<PackageReference Include="SqliteWasmBlazor.
    # Crypto.UI" ... />` block — ItemGroup conditions are ignored at restore
    # time. NuGet then picks the leaked ProjectReference (project wins over
    # package) and writes type=project into Crypto's project.assets.json.
    # At build time `Condition='Debug'` excludes the @(ProjectReference)
    # item, but assets.json still claims the dep is satisfied — so csc gets
    # neither the project's bin/ nor the package's lib/ reference and fails
    # with `error CS0234: 'Hosting' does not exist`.
    #
    # Per-project `dotnet build` does single-project restore, which honors
    # Conditions at the project level. Each lib auto-packs into the
    # repo-local `.nuget/` source via `GeneratePackageOnBuild=true`, so the
    # downstream PackageReference chain (Components -> base, Crypto.UI ->
    # Crypto -> base, Demo -> Crypto.UI/Components/FloatingWindow) resolves
    # cleanly on the next build.
    - name: Build SqliteWasmBlazor (base) — auto-pack
      run: dotnet build src/Base/SqliteWasmBlazor/SqliteWasmBlazor.csproj -c Release

    - name: Build SqliteWasmBlazor.Models
      run: dotnet build src/Base/SqliteWasmBlazor.Models/SqliteWasmBlazor.Models.csproj -c Release

    - name: Build SqliteWasmBlazor.Components
      run: dotnet build src/Base/SqliteWasmBlazor.Components/SqliteWasmBlazor.Components.csproj -c Release

    - name: Build SqliteWasmBlazor.Crypto — auto-pack
      run: dotnet build src/Crypto/SqliteWasmBlazor.Crypto/SqliteWasmBlazor.Crypto.csproj -c Release

    - name: Build SqliteWasmBlazor.Crypto.UI — auto-pack
      run: dotnet build src/Crypto/SqliteWasmBlazor.Crypto.UI/SqliteWasmBlazor.Crypto.UI.csproj -c Release

    - name: Build SqliteWasmBlazor.Crypto.BouncyCastle
      run: dotnet build src/Crypto/SqliteWasmBlazor.Crypto.BouncyCastle/SqliteWasmBlazor.Crypto.BouncyCastle.csproj -c Release

    - name: Build samples
      run: |
        dotnet build samples/SqliteWasmBlazor.FloatingWindow/SqliteWasmBlazor.FloatingWindow.csproj -c Release
        dotnet build samples/SqliteWasmBlazor.Demo/SqliteWasmBlazor.Demo.csproj -c Release
        dotnet build samples/SqliteWasmBlazor.AdoNetSample/SqliteWasmBlazor.AdoNetSample.csproj -c Release
        dotnet build samples/SqliteWasmBlazor.TestApp/SqliteWasmBlazor.TestApp.csproj -c Release

    - name: Build tests
      run: |
        dotnet build tests/SqliteWasmBlazor.TestHost/SqliteWasmBlazor.TestHost.csproj -c Release
        dotnet build tests/SqliteWasmBlazor.Tests/SqliteWasmBlazor.Tests.csproj -c Release

    - name: Install Playwright browsers
      run: pwsh tests/SqliteWasmBlazor.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps

    # `--logger trx` writes a structured XML report naming each failed test
    # plus its exception message — critical when VSTestTask returns false
    # without logging (MSB4181), which hides the actual assertion failure.
    # `--blame-hang-timeout 5m` produces a dump on hangs; `--blame-crash`
    # produces a dump on crashes. Both land under TestResults/.
    - name: Test
      run: |
        dotnet test tests/SqliteWasmBlazor.Tests/SqliteWasmBlazor.Tests.csproj \
          -c Release --no-build --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          --logger "console;verbosity=detailed" \
          --blame-hang-timeout 5m --blame-crash \
          --results-directory TestResults

    - name: Upload test diagnostics on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-diagnostics
        path: |
          TestResults/**/*
          tests/SqliteWasmBlazor.Tests/TestResults/**/*
        if-no-files-found: warn
